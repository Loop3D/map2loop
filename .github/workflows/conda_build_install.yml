name: Test Conda Build and Import


on:
  push:
  workflow_dispatch:

jobs:
  test-conda-build:
    name: Test Conda Build and Import
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3.1.0
      

      - name: Install conda-build
        run: conda install -y conda-build

      - name: Build Conda package
        run: conda-build conda

      - name: Create environment and install package
        run: |
          conda create -y -n test-env python=3.10
          source activate test-env
          conda install -y --use-local $(conda build conda --output)

      - name: Test import
        run: |
          source activate test-env
          python -c "import map2loop"
