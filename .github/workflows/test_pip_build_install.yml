name: Test Pip Installation and Import

on:
  push:
  workflow_dispatch:

jobs:
  test-pip-install:
    name: Test Pip Installation and Import
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, windows-latest]
        python-version: ${{ fromJSON(vars.PYTHON_VERSIONS)}}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install GDAL Linux
        if : runner.os == 'Linux'
        run: |
          sudo add-apt-repository ppa:ubuntugis/ubuntugis-unstable -y
          sudo apt-get update
          sudo apt-get install -y libgdal-dev gdal-bin python3-gdal
          export CPLUS_INCLUDE_PATH=/usr/include/gdal
          export C_INCLUDE_PATH=/usr/include/gdal
          python -m pip install GDAL==$(gdal-config --version)

      - name: Install conda Windows
        if: runner.os == 'Windows'
        uses: conda-incubator/setup-miniconda@v3.1.0
        with:
          miniforge-version: latest

      - name: Install GDAL using conda
        if: runner.os == 'Windows'
        run: |
          conda install gdal -y

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel build
          

      - name: Build map2loop
        run: |
          python -m build 

      - name: Install map2loop
        run: |
          conda install gdal -y 
          python -m pip install dist/*.whl
           

      - name: Test import
        run: |
          python -c "import map2loop" 